<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Updating...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .update-container {
      text-align: center;
      padding: 30px 40px;
      width: 100%;
    }
    .update-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      color: #25D366;
    }
    .update-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1a1a1a;
    }
    .update-message {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }
    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #25D366, #128C7E);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-text {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="update-container">
    <svg class="update-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="7 10 12 15 17 10" />
      <line x1="12" y1="15" x2="12" y2="3" />
    </svg>
    <div class="update-title" id="update-title">Downloading Update...</div>
    <div class="update-message" id="update-message">Please wait while the new version is downloaded.</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">0%</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    ipcRenderer.on('update:download-progress', (_, data) => {
      const bar = document.getElementById('progress-bar');
      const text = document.getElementById('progress-text');
      const pct = Math.round(data.percent || 0);
      bar.style.width = pct + '%';
      text.textContent = pct + '%';
    });

    ipcRenderer.on('update:downloaded', () => {
      document.getElementById('update-title').textContent = 'Update Ready!';
      document.getElementById('update-message').textContent = 'Installing update and restarting...';
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-text').textContent = '100%';
    });

    ipcRenderer.on('update:error', (_, msg) => {
      document.getElementById('update-title').textContent = 'Update Failed';
      document.getElementById('update-message').textContent = msg || 'An error occurred while downloading the update.';
      document.getElementById('progress-text').textContent = '';
    });
  </script>
</body>
</html>
